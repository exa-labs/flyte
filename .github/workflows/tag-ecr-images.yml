name: Build & Push ECR Images (Tag)

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-west-2' }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  ECR_REPOSITORY_PREFIX: ${{ secrets.ECR_REPOSITORY_PREFIX || 'exa-hephaestus' }}

jobs:
  build_and_push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [datacatalog, flyteadmin, flytecopilot, flytepropeller, flytescheduler]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract tag version
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        env:
          REPOSITORY_NAME: ${{ env.ECR_REPOSITORY_PREFIX }}/flyte
        run: |
          aws ecr describe-repositories --repository-names "$REPOSITORY_NAME" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$REPOSITORY_NAME" >/dev/null

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/flyte:${{ steps.tag.outputs.version }}-${{ matrix.component }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/flyte:latest-${{ matrix.component }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tags
        run: |
          echo "Built and pushed:"
          echo "  ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/flyte:${{ steps.tag.outputs.version }}-${{ matrix.component }}"
          echo "  ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/flyte:latest-${{ matrix.component }}"
