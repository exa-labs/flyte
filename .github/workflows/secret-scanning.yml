name: Secret Scanning

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          extra_args: --only-verified
